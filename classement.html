<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Passion Football | Classements</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="structure css/mobile-base.css">
    <link rel="stylesheet" href="structure css/classement.css">
    <link rel="stylesheet" href="structure css/nav-shared.css">
    <!-- html2canvas pour partage d'image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <!-- FIX : Fond bloqué en arrière-plan -->
    <div class="bg-watermark-container">
        <img src="pics/background_index.jpeg" alt="Fond" class="bg-image">
        <div class="bg-overlay"></div>
    </div>

    <!-- Navigation Latérale (injectée par js/nav.js) -->
    <nav class="side-nav" id="sideNav"></nav>

    <main class="classement-content">
        <header class="page-header">
            <div class="header-text">
                <span class="subtitle">STATISTIQUES OFFICIELLES</span>
                <h2 id="rankingTitle">CLASSEMENT <span>GÉNÉRAL</span></h2>
            </div>
            <div class="share-buttons">
                <button class="btn-share btn-share-podium" id="btnSharePodium" title="Partager le podium">
                    🏆 PODIUM
                </button>
                <button class="btn-share btn-share-list" id="btnShareList" title="Partager le classement">
                    📋 CLASSEMENT
                </button>
            </div>
        </header>

        <!-- Filtre par période / saison -->
        <div class="period-filter">
            <label>📅 SAISON</label>
            <select id="periodSelect">
                <option value="current" selected>Saison 2025-2026 (actuelle)</option>
                <option value="all">Toutes périodes</option>
            </select>
            <span class="period-hint" id="periodHint"></span>
        </div>

        <!-- Onglets -->
        <nav class="ranking-tabs">
            <button class="tab-btn active" data-metric="total_points" data-label="GÉNÉRAL">GÉNÉRAL</button>
            <button class="tab-btn" data-metric="total_buts" data-label="BUTEURS">BUTEURS</button>
            <button class="tab-btn" data-metric="total_assists" data-label="PASSEURS">PASSEURS</button>
            <button class="tab-btn" data-metric="total_victoires" data-label="VICTOIRES">VICTOIRES</button>
            <button class="tab-btn tab-vote" data-metric="top3_attaquant" data-label="TOP ATTAQUANT">TOP ATT.</button>
            <button class="tab-btn tab-vote" data-metric="top3_defenseur" data-label="TOP DÉFENSEUR">TOP DÉF.</button>
            <button class="tab-btn tab-vote" data-metric="top3_milieu" data-label="TOP MILIEU">TOP MID.</button>
            <button class="tab-btn tab-vote" data-metric="top3_gardien" data-label="TOP GARDIEN">TOP GKD.</button>
            <button class="tab-btn" data-metric="eclat" data-label="ÉCLATS">ÉCLATS</button>
            <button class="tab-btn btn-neg" data-metric="antijeu" data-label="ANTI-JEU">ANTI-JEU</button>
            <button class="tab-btn btn-neg" data-metric="jaunes" data-label="CARTONS JAUNES">JAUNES</button>
            <button class="tab-btn btn-neg" data-metric="rouges" data-label="CARTONS ROUGES">ROUGES</button>
        </nav>

        <!-- Conteneur capturé pour le partage -->
        <div id="shareableArea">

            <!-- Vue PODIUM (toujours en haut sauf général) -->
            <section class="podium-olympic" id="podiumContainer"></section>

            <!-- Vue CLASSEMENT GÉNÉRAL = tableau Excel triable -->
            <section id="generalTableSection" class="general-table-section">
                <div class="table-scroll-x">
                    <table class="ranking-excel" id="rankingExcel">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <!-- Vue CLASSEMENT SPÉCIALISÉ = compact Top 10 -->
            <section id="compactRankingSection" class="compact-ranking" style="display:none;">
                <div id="compactRankingList"></div>
            </section>

        </div>

    </main>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { requireAuth } from './js/auth-guard.js';
        import { injectSidebar } from './js/nav.js';
        import { collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const session = await requireAuth();
        injectSidebar(session);

        // ========== UTILS ==========
        function getPhotoPath(user) {
            const data = user.photo_url || user.photo_nom;
            if (!data) return null;
            if (typeof data === 'string' && data.startsWith('http')) return data;
            return `pics/${data}`;
        }
        function getInitiales(user) {
            const src = user.nom_complet || user.pseudo || '?';
            return src.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
        }
        function avatarHtml(user, sizeClass = '') {
            const src = getPhotoPath(user);
            const ini = getInitiales(user);
            return src
                ? `<img src="${src}" class="avatar ${sizeClass}" alt="${user.pseudo}" onerror="this.outerHTML='<span class=&quot;avatar-fallback ${sizeClass}&quot;>${ini}</span>'">`
                : `<span class="avatar-fallback ${sizeClass}">${ini}</span>`;
        }

        // Configuration des colonnes pour le tableau Excel (général)
        const COLUMNS = [
            { key: 'pseudo',          label: 'JOUEUR',  type: 'text',  default: '—', sticky: true },
            { key: 'total_points',    label: 'PTS',     type: 'num',   default: 0, gold: true },
            { key: 'total_buts',      label: 'BUTS',    type: 'num',   default: 0 },
            { key: 'total_assists',   label: 'ASSISTS', type: 'num',   default: 0 },
            { key: 'total_victoires', label: 'V',       type: 'num',   default: 0 },
            { key: 'total_nuls',      label: 'N',       type: 'num',   default: 0 },
            { key: 'total_defaites',  label: 'D',       type: 'num',   default: 0 },
            { key: 'top3_attaquant',  label: 'TOP ATT', type: 'num',   default: 0 },
            { key: 'top3_defenseur',  label: 'TOP DÉF', type: 'num',   default: 0 },
            { key: 'top3_milieu',     label: 'TOP MID', type: 'num',   default: 0 },
            { key: 'top3_gardien',    label: 'TOP GKD', type: 'num',   default: 0 },
            { key: 'eclat',           label: 'ÉCLAT',   type: 'num',   default: 0, color: 'green' },
            { key: 'antijeu',         label: 'ANTI-JEU', type: 'num',  default: 0, color: 'red' },
            { key: 'jaunes',          label: 'JAUNES',  type: 'num',   default: 0, color: 'yellow' },
            { key: 'rouges',          label: 'ROUGES',  type: 'num',   default: 0, color: 'red' }
        ];

        let allUsers = [];           // tous les users (avec stats cumulées)
        let displayUsers = [];        // ce qui est affiché (filtré par période)
        let matchHistoryCache = {};   // cache par année
        let currentPeriod = 'all';
        let currentSort = { key: 'total_points', dir: 'desc' };
        let currentMetric = 'total_points';
        let currentLabel = 'GÉNÉRAL';

        async function chargerUsers() {
            const snap = await getDocs(collection(db, "users"));
            allUsers = [];
            snap.forEach(d => {
                const u = { id: d.id, ...d.data() };
                // SANCTION NIVEAU 1 : on cache les joueurs en retard >= 1 mois
                if ((u.mois_retard || 0) < 1) allUsers.push(u);
            });
        }

        // Filtre par période : agrège match_history pour une année donnée
        async function loadHistoryForYear(year) {
            if (matchHistoryCache[year]) return matchHistoryCache[year];
            try {
                const q = query(
                    collection(db, "match_history"),
                    where("match_date", ">=", year + '-01-01'),
                    where("match_date", "<=", year + '-12-31')
                );
                const snap = await getDocs(q);
                const items = [];
                snap.forEach(d => items.push(d.data()));
                matchHistoryCache[year] = items;
                return items;
            } catch (e) {
                console.warn("Erreur lecture match_history:", e.message);
                return [];
            }
        }

        function aggregateByPlayer(items) {
            const agg = {};
            items.forEach(h => {
                const id = h.player_id;
                if (!id) return;
                const baseUser = allUsers.find(u => u.id === id);
                if (!baseUser) return; // joueur masqué (sanction) → on l'ignore
                if (!agg[id]) {
                    agg[id] = {
                        ...baseUser,    // hérite photo, postes, pseudo, etc.
                        total_points: 0, total_buts: 0, total_assists: 0,
                        total_victoires: 0, total_nuls: 0, total_defaites: 0,
                        jaunes: 0, rouges: 0, eclat: 0, antijeu: 0,
                        top3_attaquant: 0, top3_defenseur: 0, top3_milieu: 0, top3_gardien: 0
                    };
                }
                const a = agg[id];
                a.total_points += h.points_match || 0;
                a.total_buts += h.buts || 0;
                a.total_assists += h.assists || 0;
                a.total_victoires += h.victoires || 0;
                a.total_nuls += h.nuls || 0;
                a.total_defaites += h.defaites || 0;
                a.jaunes += h.jaunes || 0;
                a.rouges += h.rouges || 0;
                a.eclat += h.eclat || 0;
                a.antijeu += h.antijeu || 0;
                a.top3_attaquant += h.top3_attaquant || 0;
                a.top3_defenseur += h.top3_defenseur || 0;
                a.top3_milieu += h.top3_milieu || 0;
                a.top3_gardien += h.top3_gardien || 0;
            });
            return Object.values(agg);
        }

        async function applyPeriod() {
            currentPeriod = document.getElementById('periodSelect').value;
            const hint = document.getElementById('periodHint');
            if (currentPeriod === 'current' || currentPeriod === 'all') {
                // La saison 2025-2026 actuelle = toutes les stats cumulées (on vient de commencer)
                displayUsers = allUsers;
                hint.textContent = currentPeriod === 'current'
                    ? `Saison 2025-2026 • ${allUsers.length} joueurs`
                    : 'Toutes les statistiques cumulées';
            } else {
                hint.textContent = 'Chargement...';
                const items = await loadHistoryForYear(currentPeriod);
                displayUsers = aggregateByPlayer(items);
                hint.textContent = items.length === 0
                    ? `Aucun match enregistré pour cette période`
                    : `${items.length} entrée(s) match — ${displayUsers.length} joueur(s)`;
            }
            // Re-render avec la nouvelle source de données
            selectTab(currentMetric, currentLabel);
        }

        // ========== VUE GÉNÉRAL (tableau Excel triable) ==========
        function renderGeneral() {
            document.getElementById('generalTableSection').style.display = 'block';
            document.getElementById('compactRankingSection').style.display = 'none';
            document.getElementById('podiumContainer').style.display = 'flex';

            // PODIUM (top 3 sur le critère courant)
            renderPodium('total_points');

            const table = document.getElementById('rankingExcel');
            const thead = table.querySelector('thead');
            const tbody = table.querySelector('tbody');

            // Header (clickable for sort)
            thead.innerHTML = '<tr>' + '<th class="rank-col">#</th>' +
                COLUMNS.map(c => {
                    const isSorted = currentSort.key === c.key;
                    const arrow = isSorted ? (currentSort.dir === 'desc' ? '▼' : '▲') : '';
                    return `<th class="${c.sticky ? 'sticky-col' : ''} sortable" data-sort-key="${c.key}">
                        ${c.label} <span class="sort-arrow">${arrow}</span>
                    </th>`;
                }).join('') + '</tr>';

            thead.querySelectorAll('.sortable').forEach(th => {
                th.addEventListener('click', () => {
                    const k = th.dataset.sortKey;
                    if (currentSort.key === k) {
                        currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
                    } else {
                        currentSort = { key: k, dir: 'desc' };
                    }
                    renderGeneral();
                });
            });

            // Body
            const sorted = [...displayUsers].sort((a, b) => {
                const av = a[currentSort.key] ?? (currentSort.key === 'pseudo' ? '' : 0);
                const bv = b[currentSort.key] ?? (currentSort.key === 'pseudo' ? '' : 0);
                if (typeof av === 'string') return currentSort.dir === 'desc' ? bv.localeCompare(av) : av.localeCompare(bv);
                return currentSort.dir === 'desc' ? (bv - av) : (av - bv);
            });

            tbody.innerHTML = sorted.map((u, i) => {
                const cells = COLUMNS.map(c => {
                    let val = u[c.key];
                    if (c.key === 'pseudo') {
                        return `<td class="sticky-col player-name-cell">
                            ${avatarHtml(u, 'mini')}
                            <span>${val || '—'}</span>
                        </td>`;
                    }
                    val = (val == null) ? c.default : val;
                    let cls = 'num-cell';
                    if (c.gold) cls += ' gold-cell';
                    if (c.color) cls += ' color-' + c.color;
                    if (val < 0) cls += ' negative';
                    return `<td class="${cls}">${val}</td>`;
                }).join('');
                return `<tr><td class="rank-col">${i + 1}</td>${cells}</tr>`;
            }).join('');
        }

        // ========== PODIUM JO ==========
        function renderPodium(metric) {
            const sorted = [...displayUsers]
                .filter(u => (u[metric] ?? 0) > 0)
                .sort((a, b) => (b[metric] ?? 0) - (a[metric] ?? 0));
            const top3 = sorted.slice(0, 3);
            const container = document.getElementById('podiumContainer');
            container.style.display = 'flex';
            if (top3.length === 0) { container.innerHTML = ''; return; }

            // Ordre visuel JO : 2ème, 1er, 3ème
            const order = [];
            if (top3[1]) order.push({ user: top3[1], rank: 2, height: 'h-2' });
            if (top3[0]) order.push({ user: top3[0], rank: 1, height: 'h-1' });
            if (top3[2]) order.push({ user: top3[2], rank: 3, height: 'h-3' });

            const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };

            container.innerHTML = order.map(({ user, rank, height }) => `
                <div class="podium-place rank-${rank}">
                    <div class="podium-avatar-wrap">
                        ${avatarHtml(user, 'podium-avatar')}
                        <div class="medal">${medals[rank]}</div>
                    </div>
                    <div class="podium-pseudo">${user.pseudo || '—'}</div>
                    <div class="podium-pts">${user[metric] ?? 0}<span>${metric === 'total_points' ? ' PTS' : ''}</span></div>
                    <div class="podium-block ${height}">
                        <div class="podium-rank-num">${rank}</div>
                    </div>
                </div>
            `).join('');
        }

        // ========== CLASSEMENTS SPÉCIALISÉS (Top 10 + podium + liste) ==========
        function renderCompact(metric, label) {
            document.getElementById('generalTableSection').style.display = 'none';
            document.getElementById('compactRankingSection').style.display = 'block';

            const sorted = [...displayUsers]
                .filter(u => (u[metric] ?? 0) !== 0)
                .sort((a, b) => (b[metric] ?? 0) - (a[metric] ?? 0))
                .slice(0, 10); // TOP 10

            renderPodium(metric);

            const list = document.getElementById('compactRankingList');
            if (sorted.length === 0) {
                list.innerHTML = '<div class="empty-rank">Aucun joueur dans cette catégorie pour le moment.</div>';
                return;
            }

            // ⚠️ La liste contient TOUS les Top 10 (incluant les 3 premiers pour qu'on les retrouve)
            list.innerHTML = `
                <div class="compact-header">
                    <span>RANG</span><span>JOUEUR</span><span class="text-right">${label}</span>
                </div>
                ` + sorted.map((u, i) => {
                    const rank = i + 1;
                    const medal = rank <= 3 ? ['🥇','🥈','🥉'][rank - 1] : '';
                    const cls = rank <= 3 ? `top-row top-${rank}` : '';
                    return `
                        <div class="compact-row ${cls}">
                            <span class="rank-cell">${medal}<span class="rank-num">#${rank}</span></span>
                            <div class="compact-player">
                                ${avatarHtml(u, 'mini')}
                                <span>${u.pseudo || '—'}</span>
                            </div>
                            <span class="compact-value">${u[metric] ?? 0}</span>
                        </div>`;
                }).join('');
        }

        // ========== ROUTING TABS ==========
        function selectTab(metric, label) {
            currentMetric = metric;
            currentLabel = label;
            document.getElementById('rankingTitle').innerHTML = `CLASSEMENT <span>${label}</span>`;
            if (metric === 'total_points') {
                renderGeneral();
            } else {
                renderCompact(metric, label);
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.tab-btn.active').classList.remove('active');
                btn.classList.add('active');
                selectTab(btn.dataset.metric, btn.dataset.label);
            });
        });

        // ========== PARTAGE SOCIAL ==========
        // Précharge les images en base64 (contourne le CORS pour html2canvas)
        async function preloadImagesAsDataURL(container) {
            const imgs = Array.from(container.querySelectorAll('img'));
            await Promise.all(imgs.map(async (img) => {
                const src = img.src;
                if (!src || src.startsWith('data:')) return;
                try {
                    const r = await fetch(src, { mode: 'cors' });
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    const blob = await r.blob();
                    const dataUrl = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    });
                    img.src = dataUrl;
                } catch (e) {
                    // Fallback : remplace par l'initiale (span)
                    const fallback = img.dataset.fallbackInitiales || '?';
                    const span = document.createElement('span');
                    span.className = 'avatar-fallback ' + (img.classList.contains('podium-avatar') ? 'podium-avatar' : 'mini');
                    span.textContent = fallback;
                    img.replaceWith(span);
                }
            }));
        }

        async function captureAndShare(buildFrame, fileSuffix) {
            const wrapper = buildFrame();
            wrapper.style.position = 'fixed';
            wrapper.style.top = '-99999px';
            wrapper.style.left = '0';
            wrapper.style.pointerEvents = 'none';
            document.body.appendChild(wrapper);

            try {
                await preloadImagesAsDataURL(wrapper);
                // Petit délai pour que les images base64 se rendent
                await new Promise(r => setTimeout(r, 200));

                const canvas = await html2canvas(wrapper, {
                    backgroundColor: '#0a0a0a',
                    scale: 2,
                    useCORS: true,
                    allowTaint: false,
                    logging: false,
                    width: wrapper.offsetWidth,
                    height: wrapper.offsetHeight
                });
                const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                const fileName = `${fileSuffix}-${currentLabel.toLowerCase().replace(/\s/g,'-')}-${new Date().toISOString().slice(0,10)}.png`;
                const file = new File([blob], fileName, { type: 'image/png' });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Passion Football • ' + currentLabel,
                        text: 'Classement ' + currentLabel + ' • Passion Football'
                    });
                } else {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    a.click();
                    URL.revokeObjectURL(url);
                    alert("Image téléchargée. Tu peux maintenant la partager sur WhatsApp / Facebook / Twitter.");
                }
            } catch (e) {
                console.error(e);
                alert("Erreur de génération: " + e.message);
            } finally {
                document.body.removeChild(wrapper);
            }
        }

        function buildPodiumFrame() {
            const podiumClone = document.getElementById('podiumContainer').cloneNode(true);
            podiumClone.classList.add('podium-share-xl'); // taille XL pour le partage
            const w = document.createElement('div');
            w.className = 'share-frame';
            const date = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            w.innerHTML = `
                <div class="share-header">
                    <div class="share-brand">PASSION<span>FOOTBALL</span></div>
                    <div class="share-cat">${currentLabel}</div>
                    <div class="share-date">${date}</div>
                </div>`;
            w.appendChild(podiumClone);
            w.innerHTML += `<div class="share-footer">🏆 PODIUM OFFICIEL • Saison 2026</div>`;
            return w;
        }

        function buildListFrame() {
            const isGeneral = currentMetric === 'total_points';
            const target = isGeneral
                ? document.getElementById('generalTableSection').cloneNode(true)
                : document.getElementById('compactRankingList').cloneNode(true);
            const w = document.createElement('div');
            w.className = 'share-frame share-frame-list';
            const date = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            w.innerHTML = `
                <div class="share-header">
                    <div class="share-brand">PASSION<span>FOOTBALL</span></div>
                    <div class="share-cat">CLASSEMENT • ${currentLabel}</div>
                    <div class="share-date">${date}</div>
                </div>`;
            w.appendChild(target);
            w.innerHTML += `<div class="share-footer">📋 CLASSEMENT OFFICIEL • Saison 2026</div>`;
            return w;
        }

        function bindShareBtn(btnId, builder, fileSuffix) {
            const btn = document.getElementById(btnId);
            btn.addEventListener('click', async () => {
                const original = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = '⏳';
                try {
                    await captureAndShare(builder, fileSuffix);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = original;
                }
            });
        }
        bindShareBtn('btnSharePodium', buildPodiumFrame, 'podium');
        bindShareBtn('btnShareList', buildListFrame, 'classement');

        // ========== INIT ==========
        document.getElementById('periodSelect').addEventListener('change', applyPeriod);

        async function init() {
            await chargerUsers();
            displayUsers = allUsers; // saison 2025-2026 = toutes les stats actuelles
            document.getElementById('periodHint').textContent = `Saison 2025-2026 • ${allUsers.length} joueurs`;
            selectTab('total_points', 'GÉNÉRAL');
        }
        init();
    </script>
</body>
</html>
